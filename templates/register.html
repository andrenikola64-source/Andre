<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Create Account</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="background-glow"></div>

<div class="auth-container">

    <!-- LEFT SIDE -->
    <div class="auth-info">

        <h1 class="logo">
            Join The Family
        </h1>

        <p class="subtitle">
            Create your private family account
            and stay connected with love,
            memories, and special moments.
        </p>

        <div class="feature-list">

            <div class="feature-card">
                🔒 Secure & Private
            </div>

            <div class="feature-card">
                ❤️ Family Connection
            </div>

            <div class="feature-card">
                🌍 Access Anywhere
            </div>

            <div class="feature-card">
                ✨ Modern Experience
            </div>

        </div>

    </div>

    <!-- RIGHT SIDE -->
    <div class="auth-box">

        <h2>Create Account</h2>

        <form method="POST">

            <input
            type="text"
            name="username"
            placeholder="Choose Username"
            required>

            <input
            type="password"
            name="password"
            placeholder="Create Password"
            required>

            <button type="submit">
                Create Account
            </button>

        </form>

        <a href="/login" class="switch-link">
            Already have an account? Login
        </a>

        <a href="/" class="home-link">
            ← Back To Home
        </a>

    </div>

</div>

</body>
</html>
