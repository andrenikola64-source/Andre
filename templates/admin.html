<!DOCTYPE html>
<html>
<head>
    <title>Admin</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="container">
    <div class="box admin-box">
        <h1>Admin Panel</h1>
        {% for user in users %}
        <div class="user-card">
            <p><strong>Username:</strong> {{ user.username }}</p>
            <p><strong>Password Hash:</strong></p>
            <small>{{ user.password }}</small>
        </div>
        {% endfor %}
    </div>
</div>
</body>
</html>
